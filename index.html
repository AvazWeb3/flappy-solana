<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Solana</title>
<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #111827, #020617);
  overflow: hidden;
}
canvas {
  display: block;
  margin: 0 auto;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 600;

let coin;
let pipes;
let score;
let frame;
let gameOver;

function initGame() {
  coin = {
    x: 80,
    y: 300,
    r: 30,
    velocity: 0
  };

  pipes = [];
  score = 0;
  frame = 0;
  gameOver = false;
}

initGame();

/* ===== Controls ===== */
function jump() {
  if (gameOver) {
    initGame();
    return;
  }
  coin.velocity = -10;
}

document.addEventListener("keydown", jump);
document.addEventListener("click", jump);

/* ===== Draw Coin ===== */
function drawCoin() {
  const r = coin.r;

  const g = ctx.createRadialGradient(
    coin.x-10, coin.y-10, 5,
    coin.x, coin.y, r
  );
  g.addColorStop(0,"#333");
  g.addColorStop(1,"#000");

  ctx.beginPath();
  ctx.arc(coin.x, coin.y, r, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();

  const grad = ctx.createLinearGradient(
    coin.x-r, coin.y-r,
    coin.x+r, coin.y+r
  );
  grad.addColorStop(0,"#00ffa3");
  grad.addColorStop(1,"#9945ff");

  ctx.fillStyle = grad;

  for(let i=-1;i<=1;i++){
    ctx.save();
    ctx.translate(coin.x, coin.y+i*r*0.4);
    ctx.rotate(-0.25);
    ctx.fillRect(-r, -r*0.15, r*2, r*0.3);
    ctx.restore();
  }
}

/* ===== Create Pipes (как Flappy) ===== */
function createPipe() {
  const gap = 170;
  const topHeight = Math.random() * 250 + 50;

  pipes.push({
    x: canvas.width,
    top: topHeight,
    bottom: canvas.height - topHeight - gap,
    passed: false
  });
}

/* ===== Update ===== */
function update() {
  if (gameOver) return;

  // Gravity
  coin.velocity += 0.6;
  coin.y += coin.velocity;

  // Ceiling / Floor
  if (coin.y - coin.r < 0 || coin.y + coin.r > canvas.height) {
    gameOver = true;
  }

  // Pipes movement
  pipes.forEach(pipe => {
    pipe.x -= 2;

    // Collision
    if (
      coin.x + coin.r > pipe.x &&
      coin.x - coin.r < pipe.x + 60 &&
      (coin.y - coin.r < pipe.top ||
       coin.y + coin.r > canvas.height - pipe.bottom)
    ) {
      gameOver = true;
    }

    // Score
    if (!pipe.passed && pipe.x + 60 < coin.x) {
      score++;
      pipe.passed = true;
    }
  });

  pipes = pipes.filter(pipe => pipe.x + 60 > 0);

  // Spawn every 90 frames
  if (frame % 90 === 0) {
    createPipe();
  }

  frame++;
}

/* ===== Draw ===== */
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawCoin();

  pipes.forEach(pipe => {
    ctx.fillStyle = "#ff3b3b";
    ctx.fillRect(pipe.x, 0, 60, pipe.top);
    ctx.fillRect(
      pipe.x,
      canvas.height - pipe.bottom,
      60,
      pipe.bottom
    );
  });

  ctx.fillStyle="white";
  ctx.font="24px Arial";
  ctx.fillText("Score: "+score,20,40);

  if (gameOver) {
    ctx.fillStyle="red";
    ctx.font="40px Arial";
    ctx.fillText("LIQUIDATED",70,280);

    ctx.fillStyle="white";
    ctx.font="18px Arial";
    ctx.fillText("Click to Restart",130,320);
  }
}

/* ===== Game Loop ===== */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
