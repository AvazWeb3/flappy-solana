<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Solana Stable</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at top, #111827, #020617);
}
canvas {
  display: block;
  margin: 0 auto;
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 600;

let coin = {
  x: 80,
  y: 300,
  r: 30,
  gravity: 0.6,
  lift: -10,
  velocity: 0
};

let candles = [];
let candleWidth = 60;
let gap = 170;
let frame = 0;
let score = 0;
let gameOver = false;

/* ===== Controls ===== */
function jump() {
  if (!gameOver) coin.velocity = coin.lift;
}

document.addEventListener("keydown", () => {
  if (gameOver) restartGame();
  else jump();
});

document.addEventListener("click", () => {
  if (gameOver) restartGame();
  else jump();
});

/* ===== Draw Coin (dark coin + Solana stripes) ===== */
function drawCoin() {
  const r = coin.r;

  const gradient = ctx.createRadialGradient(
    coin.x - r/3,
    coin.y - r/3,
    r/5,
    coin.x,
    coin.y,
    r
  );
  gradient.addColorStop(0, "#2a2a2a");
  gradient.addColorStop(1, "#000000");

  ctx.beginPath();
  ctx.arc(coin.x, coin.y, r, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();

  const stripeGradient = ctx.createLinearGradient(
    coin.x - r,
    coin.y - r,
    coin.x + r,
    coin.y + r
  );
  stripeGradient.addColorStop(0, "#00ffa3");
  stripeGradient.addColorStop(1, "#9945ff");

  ctx.fillStyle = stripeGradient;

  for (let i = -1; i <= 1; i++) {
    ctx.save();
    ctx.translate(coin.x, coin.y + i * r * 0.4);
    ctx.rotate(-0.25);
    ctx.fillRect(-r, -r * 0.15, r * 2, r * 0.3);
    ctx.restore();
  }
}

/* ===== Update Coin ===== */
function updateCoin() {
  coin.velocity += coin.gravity;
  coin.y += coin.velocity;

  if (
    coin.y + coin.r > canvas.height ||
    coin.y - coin.r < 0
  ) {
    gameOver = true;
  }
}

/* ===== Candles ===== */
function createCandle() {
  let topHeight = Math.random() * 250 + 50;
  candles.push({
    x: canvas.width,
    top: topHeight,
    bottom: canvas.height - topHeight - gap
  });
}

function drawCandles() {
  candles.forEach(c => {
    ctx.fillStyle = "#ff3b3b";
    ctx.fillRect(c.x, 0, candleWidth, c.top);
    ctx.fillRect(
      c.x,
      canvas.height - c.bottom,
      candleWidth,
      c.bottom
    );

    ctx.fillStyle = "#ff8a8a";
    ctx.fillRect(c.x + candleWidth/2 - 2, c.top - 20, 4, 20);
    ctx.fillRect(
      c.x + candleWidth/2 - 2,
      canvas.height - c.bottom,
      4,
      20
    );
  });
}

function updateCandles() {
  candles.forEach(c => {
    c.x -= 2;

    if (
      coin.x + coin.r > c.x &&
      coin.x - coin.r < c.x + candleWidth &&
      (coin.y - coin.r < c.top ||
       coin.y + coin.r > canvas.height - c.bottom)
    ) {
      gameOver = true;
    }

    if (c.x + candleWidth === coin.x) score++;
  });

  candles = candles.filter(c => c.x + candleWidth > 0);

  if (frame % 90 === 0) createCandle();
}

/* ===== Score ===== */
function drawScore() {
  ctx.fillStyle = "white";
  ctx.font = "24px Arial";
  ctx.fillText("Score: " + score, 20, 40);
}

function drawGameOver() {
  ctx.fillStyle = "#ff3b3b";
  ctx.font = "40px Arial";
  ctx.fillText("LIQUIDATED", 70, 280);

  ctx.fillStyle = "white";
  ctx.font = "18px Arial";
  ctx.fillText("Click to restart", 130, 320);
}

function restartGame() {
  coin.y = 300;
  coin.velocity = 0;
  candles = [];
  score = 0;
  gameOver = false;
  frame = 0;
}

/* ===== Loop ===== */
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameOver) {
    updateCoin();
    updateCandles();
  }

  drawCoin();
  drawCandles();
  drawScore();

  if (gameOver) drawGameOver();

  frame++;
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
