<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Solana Stable</title>
<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #111827, #020617);
  overflow: hidden;
}
canvas {
  display: block;
  margin: 0 auto;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 600;

let y = 300;
let velocity = 0;
let gravity = 0.6;
let lift = -10;

let pipes = [];
let score = 0;
let gameOver = false;

function jump() {
  if (!gameOver) velocity = lift;
}

document.addEventListener("keydown", jump);
document.addEventListener("click", jump);

function drawCoin(x, y, r) {
  const g = ctx.createRadialGradient(x-10,y-10,5,x,y,r);
  g.addColorStop(0,"#333");
  g.addColorStop(1,"#000");

  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();

  const grad = ctx.createLinearGradient(x-r,y-r,x+r,y+r);
  grad.addColorStop(0,"#00ffa3");
  grad.addColorStop(1,"#9945ff");

  ctx.fillStyle = grad;

  for(let i=-1;i<=1;i++){
    ctx.save();
    ctx.translate(x,y+i*r*0.4);
    ctx.rotate(-0.25);
    ctx.fillRect(-r,-r*0.15,r*2,r*0.3);
    ctx.restore();
  }
}

function createPipe(){
  let top = Math.random()*250+50;
  pipes.push({
    x:400,
    top:top,
    bottom:600-top-160
  });
}

function update(){
  if(gameOver) return;

  velocity += gravity;
  y += velocity;

  if(y>600 || y<0){
    gameOver = true;
  }

  pipes.forEach(p=>{
    p.x -= 2;

    if(
      80+30>p.x &&
      80-30<p.x+60 &&
      (y-30<p.top || y+30>600-p.bottom)
    ){
      gameOver = true;
    }

    if(p.x+60===80){
      score++;
    }
  });

  pipes = pipes.filter(p=>p.x+60>0);

  if(Math.random()<0.02){
    createPipe();
  }
}

function draw(){
  ctx.clearRect(0,0,400,600);

  drawCoin(80,y,30);

  pipes.forEach(p=>{
    ctx.fillStyle="#ff3b3b";
    ctx.fillRect(p.x,0,60,p.top);
    ctx.fillRect(p.x,600-p.bottom,60,p.bottom);
  });

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Score: "+score,20,30);

  if(gameOver){
    ctx.fillStyle="red";
    ctx.font="40px Arial";
    ctx.fillText("LIQUIDATED",70,300);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
